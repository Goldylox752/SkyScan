<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meridian Market — AI Chat Intelligence</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0a0c0f;
  --surface:#141820;
  --border:rgba(255,255,255,.08);
  --text:#e8edf5;
  --muted:#8a97ab;
  --accent:#00e5a0;
}

/* BASE */
body{
  margin:0;
  font-family:Syne, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAV */
nav{
  padding:18px 24px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
}
.logo{font-weight:800}
.logo span{color:var(--muted)}

/* HERO */
.hero{
  padding:80px 24px;
  max-width:900px;
}
.hero h1{
  font-size:56px;
  line-height:1;
}
.hero p{
  color:var(--muted);
  margin-top:14px;
}

/* CHAT FLOAT BUTTON */
.chat-bubble{
  position:fixed;
  bottom:24px;
  right:24px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:var(--accent);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-weight:800;
  color:#000;
  box-shadow:0 10px 30px rgba(0,229,160,.3);
  z-index:9999;
}

/* CHAT WINDOW */
.chat-window{
  position:fixed;
  bottom:100px;
  right:24px;
  width:360px;
  height:520px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:9999;
}

.chat-header{
  padding:14px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat-title{
  font-weight:700;
}

.chat-close{
  cursor:pointer;
  color:var(--muted);
}

/* MESSAGES */
.chat-body{
  flex:1;
  padding:14px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  max-width:80%;
  padding:10px 12px;
  border-radius:10px;
  font-size:13px;
  line-height:1.4;
}

.user{
  background:#1f2937;
  align-self:flex-end;
}

.ai{
  background:rgba(0,229,160,.1);
  border:1px solid rgba(0,229,160,.2);
  align-self:flex-start;
}

/* INPUT */
.chat-input{
  display:flex;
  border-top:1px solid var(--border);
}

.chat-input input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  background:#0f131a;
  color:var(--text);
}

.chat-input button{
  background:var(--accent);
  border:none;
  padding:0 16px;
  font-weight:700;
  cursor:pointer;
}

/* ANIMATION */
.chat-window.open{
  display:flex;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Meridian <span>AI Chat</span></div>
</nav>

<section class="hero">
  <h1>Turn Visitors Into<br>Customers With AI Chat</h1>
  <p>
    Replace Intercom with a fully autonomous AI sales + support agent
    that qualifies leads and books calls in real time.
  </p>
</section>

<!-- CHAT UI -->
<div class="chat-bubble" onclick="toggleChat()">AI</div>

<div class="chat-window" id="chatWindow">

  <div class="chat-header">
    <div class="chat-title">Meridian AI</div>
    <div class="chat-close" onclick="toggleChat()">✕</div>
  </div>

  <div class="chat-body" id="chatBody">
    <div class="msg ai">Hey 👋 I’m your AI assistant. Ask me anything about Meridian.</div>
  </div>

  <div class="chat-input">
    <input id="input" placeholder="Type a message..." />
    <button onclick="sendMsg()">Send</button>
  </div>

</div>

<script>
const chatWindow = document.getElementById("chatWindow");
const chatBody = document.getElementById("chatBody");
const input = document.getElementById("input");

function toggleChat(){
  chatWindow.classList.toggle("open");
}

function addMsg(text, type){
  const div = document.createElement("div");
  div.className = `msg ${type}`;
  div.innerText = text;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}

async function sendMsg(){
  const text = input.value;
  if(!text) return;

  addMsg(text, "user");
  input.value = "";

  // placeholder AI response (replace with backend)
  addMsg("Typing...", "ai");

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ message: text })
  }).catch(()=>null);

  // remove "Typing..."
  chatBody.lastChild.remove();

  if(!res){
    addMsg("AI offline. Connect backend at /api/chat", "ai");
    return;
  }

  const data = await res.json();
  addMsg(data.reply || "No response", "ai");
}
</script>

</body>
</html>

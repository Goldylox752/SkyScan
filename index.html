<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Meridian Market</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0a0c15;
  --panel:#111827;
  --border:rgba(255,255,255,0.06);
  --green:#4ade80;
  --blue:#2563eb;
  --muted:rgba(255,255,255,0.7);
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:white;
}

/* TOP BAR */
.topbar{
  padding:10px;
  text-align:center;
  font-size:12px;
  background:#0f172a;
  border-bottom:1px solid var(--border);
}

/* HEADER */
.header{
  max-width:1100px;
  margin:auto;
  padding:40px 20px 10px;
}

.header h1{
  margin:0;
  font-size:34px;
}

.header p{
  color:var(--muted);
}

/* GRID */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#111827,#0f172a);
  border:1px solid var(--border);
  border-radius:18px;
  overflow:hidden;
  transition:.2s;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-4px);
  border-color:#2563eb55;
}

.img{
  width:100%;
  height:180px;
  object-fit:cover;
  background:#0b1220;
}

.content{
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.title{
  font-size:16px;
  font-weight:700;
}

.desc{
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

/* META ROW */
.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.price{
  color:var(--green);
  font-weight:800;
}

.score{
  font-size:11px;
  color:#93c5fd;
}

/* BADGES */
.badge{
  font-size:11px;
  padding:4px 8px;
  border-radius:999px;
  background:#1f2937;
  display:inline-block;
}

.winner{
  background:#064e3b;
  color:#34d399;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:800;
  transition:.2s;
}

.buy{
  background:var(--blue);
  color:white;
}

.buy:hover{
  background:#1d4ed8;
  transform:translateY(-1px);
}

.buy:disabled{
  background:#374151;
  cursor:not-allowed;
}

/* LOADING */
.skeleton{
  height:260px;
  border-radius:18px;
  background:linear-gradient(90deg,#111827,#1f2937,#111827);
  background-size:200% 100%;
  animation:shimmer 1.4s infinite;
}

@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* EMPTY */
.empty{
  text-align:center;
  padding:40px;
  opacity:.7;
}
</style>
</head>

<body>

<div class="topbar">
  🤖 Meridian Market AI Layer • Live product intelligence • Auto checkout ready
</div>

<div class="header">
  <h1>Meridian Market</h1>
  <p>AI-powered product intelligence engine for high-margin dropshipping</p>
</div>

<div class="container">
  <div id="products" class="grid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</div>

<script>
const API = "https://YOUR-BACKEND.com";

/* LOAD PRODUCTS */
async function loadProducts(){
  try{
    const res = await fetch(`${API}/products`);
    const products = await res.json();

    const container = document.getElementById("products");

    if(!products || !products.length){
      container.innerHTML = `<div class="empty">No products found</div>`;
      return;
    }

    container.innerHTML = products.map(p => {
      const lowStock = p.stock <= 5;
      const winner = p.score && p.score > 80;

      return `
        <div class="card">
          <img class="img" src="${escapeHtml(p.image_url)}"/>

          <div class="content">

            <div class="title">${escapeHtml(p.name)}</div>
            <div class="desc">${escapeHtml(p.description || "")}</div>

            <div class="row">
              <div class="price">$${Number(p.price).toFixed(2)}</div>
              <div class="score">
                Score: ${p.score || "N/A"}
              </div>
            </div>

            <div class="row">
              <div class="badge">${lowStock ? "⚠️ Low stock" : "In stock"}</div>
              ${winner ? `<div class="badge winner">WINNER</div>` : ""}
            </div>

            <button class="btn buy"
              onclick="buy('${p.sku}')"
              ${p.stock <= 0 ? "disabled" : ""}
            >
              ${p.stock <= 0 ? "Out of Stock" : "Buy Now"}
            </button>

          </div>
        </div>
      `;
    }).join("");

  } catch(err){
    document.getElementById("products").innerHTML =
      `<div class="empty">Failed to load products</div>`;
  }
}

/* CHECKOUT */
async function buy(sku){
  try{
    const res = await fetch(`${API}/create-checkout`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ sku })
    });

    const data = await res.json();

    if(data.url){
      window.location.href = data.url;
    } else {
      alert("Checkout failed");
    }

  }catch(e){
    alert("Network error");
  }
}

/* SAFE RENDER */
function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

loadProducts();
</script>

</body>
</html>

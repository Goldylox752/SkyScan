<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Meridian Market</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0a0c0f;
  --surface:#141820;
  --border:rgba(255,255,255,.08);
  --text:#e8edf5;
  --muted:#8a97ab;
  --accent:#00e5a0;
}

body{
  margin:0;
  font-family:Syne,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
nav{
  display:flex;
  justify-content:space-between;
  padding:18px 24px;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  background:rgba(10,12,15,.9);
  backdrop-filter:blur(20px);
}

.logo{font-weight:800}

/* HERO */
.hero{
  max-width:900px;
  margin:auto;
  padding:80px 24px 30px;
  text-align:center;
}

.hero h1{
  font-size:52px;
  line-height:1.1;
}

.hero p{
  color:var(--muted);
  margin-top:14px;
}

/* LAYOUT GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  max-width:1100px;
  margin:40px auto;
  padding:0 24px;
}

.panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px;
}

/* CHAT */
.chat-body{
  height:260px;
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg{
  font-size:13px;
  padding:10px;
  border-radius:10px;
}

.ai{
  background:rgba(0,229,160,.1);
  border:1px solid rgba(0,229,160,.2);
}

.user{
  background:#1f2937;
  align-self:flex-end;
}

/* DEALS */
.deal{
  padding:10px;
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:10px;
}

.profit{
  color:var(--accent);
  font-weight:700;
}

/* INPUT */
.input{
  display:flex;
  margin-top:10px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  background:#0f131a;
  color:white;
}

button{
  background:var(--accent);
  border:none;
  padding:10px 14px;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Meridian Market</div>
</nav>

<section class="hero">
  <h1>AI Sales + Deal Intelligence<br>In One System</h1>
  <p>Meridian Market automates customer conversations and surfaces high-margin opportunities in real time.</p>
</section>

<div class="grid">

  <!-- CHAT ENGINE -->
  <div class="panel">
    <h3>AI Sales Agent</h3>

    <div class="chat-body" id="chat"></div>

    <div class="input">
      <input id="msg" placeholder="Talk to Meridian AI..." />
      <button onclick="send()">Send</button>
    </div>
  </div>

  <!-- DEAL ENGINE -->
  <div class="panel">
    <h3>Deal Intelligence Feed</h3>
    <div id="deals"></div>
  </div>

</div>

<script>

const chat = document.getElementById("chat");
const deals = document.getElementById("deals");
const msg = document.getElementById("msg");

/* CHAT UI */
function add(el,text,type){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=text;
  el.appendChild(d);
}

/* AI LOGIC */
function ai(text){
  text = text.toLowerCase();

  if(text.includes("price")){
    return "Meridian Market starts at $9.99/month with real-time deal alerts and AI sales automation.";
  }

  if(text.includes("demo") || text.includes("book")){
    return "Great — I can set up a demo. What email should I use?";
  }

  return "Are you trying to increase sales conversion or discover high-margin opportunities?";
}

/* SEND */
function send(){
  const t = msg.value;
  if(!t) return;

  add(chat,t,"user");
  msg.value="";

  const reply = ai(t);
  add(chat,reply,"ai");
}

/* DEAL ENGINE */
function loadDeals(){
  const sample=[
    {title:"MacBook Air M1",profit:120},
    {title:"MacBook Pro 2019",profit:90},
    {title:"MacBook Air 2020",profit:150}
  ];

  deals.innerHTML="";

  sample.forEach(d=>{
    const div=document.createElement("div");
    div.className="deal";
    div.innerHTML=`
      <b>${d.title}</b><br>
      <span class="profit">+$${d.profit} estimated margin</span>
    `;
    deals.appendChild(div);
  });
}

loadDeals();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Skymaster X1 Pro | 4K Roof Inspection Drone</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0a0c15;
  color: #f0f3fa;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.hero {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: center;
  padding: 60px 0;
}

h1 {
  font-size: 3rem;
  margin-bottom: 10px;
}

p { opacity: 0.8; }

.price {
  font-size: 2rem;
  color: #4ade80;
  font-weight: 700;
}

button {
  padding: 14px 24px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.primary {
  background: #2563eb;
  color: white;
}

.secondary {
  background: transparent;
  border: 1px solid #2563eb;
  color: white;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 16px;
  margin: 10px 0;
}

footer {
  text-align: center;
  opacity: 0.6;
  padding: 40px;
}
</style>
</head>

<body>

<div class="container">

  <div class="hero">
    <div>
      <h1>Inspect roofs in minutes.</h1>
      <p>No ladder. No risk. 4K drone inspections for contractors.</p>

      <div class="price">$899</div>

      <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="primary" id="buyBtn">Buy Now</button>
        <button class="secondary" id="leadBtn">Contractor Pricing</button>
      </div>

      <p id="stockText" style="margin-top:15px;">Checking stock...</p>
    </div>

    <div class="card">
      <h3>Key Features</h3>
      <p>✔ 4K Camera</p>
      <p>✔ 35 min flight</p>
      <p>✔ GPS stability</p>
      <p>✔ Instant reports</p>
    </div>
  </div>

</div>

<footer>© 2026 Skymaster X1</footer>

<!-- Modal -->
<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8);">
  <div style="background:#111; padding:20px; max-width:400px; margin:100px auto; border-radius:12px;">
    <h3>Lead Form</h3>
    <input id="name" placeholder="Name" style="width:100%; margin:5px 0; padding:10px;">
    <input id="email" placeholder="Email" style="width:100%; margin:5px 0; padding:10px;">
    <button id="submitLead" class="primary" style="width:100%; margin-top:10px;">Submit</button>
  </div>
</div>

<script>
/* ================= CONFIG ================= */
const ENV = {
  SUPABASE_URL: "https://your-project.supabase.co",
  SUPABASE_KEY: "your-anon-key",
  SKU: "SKY-X1"
};

/* ================= STOCK ================= */
let stock = 0;

async function loadStock() {
  try {
    const res = await fetch(
      `${ENV.SUPABASE_URL}/rest/v1/products?sku=eq.${ENV.SKU}&select=stock`,
      {
        headers: {
          apikey: ENV.SUPABASE_KEY,
          Authorization: `Bearer ${ENV.SUPABASE_KEY}`
        }
      }
    );

    const data = await res.json();

    stock = data?.[0]?.stock ?? 0;

    document.getElementById("stockText").textContent =
      stock > 0 ? `In stock: ${stock} units` : "Out of stock";

  } catch (e) {
    document.getElementById("stockText").textContent =
      "Stock unavailable";
  }
}

/* ================= CHECKOUT ================= */
async function checkout() {
  if (stock <= 0) return alert("Out of stock");

  try {
    const res = await fetch(`${ENV.SUPABASE_URL}/functions/v1/create-checkout`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        success_url: window.location.origin + "?success=true",
        cancel_url: window.location.origin + "?cancel=true"
      })
    });

    const data = await res.json();
    if (data?.url) window.location.href = data.url;

  } catch (e) {
    alert("Checkout failed");
  }
}

/* ================= LEAD MODAL ================= */
const modal = document.getElementById("modal");

document.getElementById("leadBtn").onclick = () => modal.style.display = "block";
modal.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };

document.getElementById("submitLead").onclick = async () => {
  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;

  if (!name || !email) return alert("Fill required fields");

  await fetch(`${ENV.SUPABASE_URL}/rest/v1/leads`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: ENV.SUPABASE_KEY,
      Authorization: `Bearer ${ENV.SUPABASE_KEY}`
    },
    body: JSON.stringify({ full_name: name, email })
  });

  alert("Submitted!");
  modal.style.display = "none";
};

/* ================= EVENTS ================= */
document.getElementById("buyBtn").onclick = checkout;

/* ================= INIT ================= */
loadStock();

if (window.location.search.includes("success=true")) {
  alert("Payment successful!");
}
</script>

</body>
</html>

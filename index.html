<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoofFlow Store</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#0a0c15;
  color:white;
}

/* HEADER */
.header{
  max-width:1100px;
  margin:auto;
  padding:40px 20px 10px;
}
.header h1{font-size:32px;margin:0;}
.header p{opacity:.7}

/* GRID */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#111827,#0f172a);
  border:1px solid rgba(255,255,255,0.05);
  border-radius:20px;
  overflow:hidden;
  transition:.2s;
  display:flex;
  flex-direction:column;
}
.card:hover{
  transform:translateY(-4px);
  border-color:#2563eb55;
}

.img{
  width:100%;
  height:180px;
  object-fit:cover;
  background:#0b1220;
}

.content{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.title{font-size:18px;font-weight:700;}
.desc{font-size:13px;opacity:.75;line-height:1.4;}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.price{
  color:#4ade80;
  font-weight:800;
  font-size:18px;
}

.stock{
  font-size:12px;
  opacity:.7;
}

.badge{
  font-size:11px;
  padding:4px 10px;
  border-radius:999px;
  background:#1f2937;
  display:inline-block;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:800;
  margin-top:8px;
  transition:.2s;
}

.buy{
  background:#2563eb;
  color:white;
}

.buy:hover{
  background:#1d4ed8;
  transform:translateY(-1px);
}

.buy:disabled{
  background:#374151;
  cursor:not-allowed;
}

/* TOP BAR */
.topbar{
  background:#0f172a;
  padding:10px;
  text-align:center;
  font-size:13px;
  border-bottom:1px solid #1f2937;
}

/* EMPTY STATE */
.empty{
  opacity:.7;
  text-align:center;
  padding:40px;
}

/* MOBILE */
@media(max-width:600px){
  .header h1{font-size:24px;}
}
</style>
</head>

<body>

<div class="topbar">
  🚀 RoofFlow Store • Live inventory • Stripe checkout • Dropshipping ready
</div>

<div class="header">
  <h1>RoofFlow Store</h1>
  <p>Professional tools for contractors & roofing companies</p>
</div>

<div class="container">
  <div id="products" class="grid">
    <div class="empty">Loading products...</div>
  </div>
</div>

<script>
const API = "https://YOUR-BACKEND.com";

/* LOAD PRODUCTS */
async function loadProducts(){
  try {
    const res = await fetch(`${API}/products`);
    const products = await res.json();

    const container = document.getElementById("products");

    if (!products || products.length === 0) {
      container.innerHTML = `<div class="empty">No products found</div>`;
      return;
    }

    container.innerHTML = products.map(p => {
      const lowStock = p.stock <= 5;

      return `
      <div class="card">
        <img class="img" src="${p.image_url}" loading="lazy"/>

        <div class="content">

          <div class="title">${escapeHtml(p.name)}</div>
          <div class="desc">${escapeHtml(p.description || "")}</div>

          <div class="row">
            <div class="price">$${Number(p.price).toFixed(2)}</div>
            <div class="stock">
              ${lowStock ? "⚠️ Low stock" : "Stock: " + p.stock}
            </div>
          </div>

          ${lowStock ? `<div class="badge">🔥 Selling fast</div>` : ""}

          <button class="btn buy"
            onclick="buy('${p.sku}')"
            ${p.stock <= 0 ? "disabled" : ""}
          >
            ${p.stock <= 0 ? "Out of Stock" : "Buy Now"}
          </button>

        </div>
      </div>
      `;
    }).join("");

  } catch(err){
    document.getElementById("products").innerHTML =
      `<div class="empty">Failed to load products</div>`;
  }
}

/* BUY FLOW */
async function buy(sku){
  try {
    const res = await fetch(`${API}/create-checkout`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ sku })
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    } else {
      alert("Checkout failed");
    }

  } catch(err){
    alert("Network error");
  }
}

/* SECURITY */
function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

loadProducts();
</script>

</body>
</html>

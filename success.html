<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Order Confirmed | Skymaster X1</title>
<meta name="description" content="Your Skymaster X1 drone order has been confirmed. Thank you for your purchase!" />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Inter', sans-serif;
  background: #0a0c15;
  color: #f0f3fa;
  line-height: 1.5;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.container {
  max-width: 700px;
  width: 100%;
}
.success-card {
  background: #0f111a;
  border-radius: 48px;
  padding: 48px 32px;
  border: 1px solid #1e293b;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  text-align: center;
}
.icon-circle {
  background: rgba(34,197,94,0.15);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
}
.icon-circle i {
  font-size: 2.5rem;
  color: #4ade80;
}
h1 {
  font-size: 2rem;
  font-weight: 800;
  margin-bottom: 12px;
}
.confirmation-details {
  background: rgba(255,255,255,0.03);
  border-radius: 24px;
  padding: 24px;
  margin: 28px 0;
  text-align: left;
  border: 1px solid rgba(255,255,255,0.05);
}
.detail-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px dashed #1e293b;
}
.detail-label {
  font-weight: 600;
  color: #9ca3af;
}
.detail-value {
  font-weight: 700;
  color: #e2e8f0;
}
.shipping-note {
  margin-top: 20px;
  font-size: 0.85rem;
  color: #86efac;
  text-align: center;
}
.btn {
  display: inline-block;
  font-weight: 700;
  text-align: center;
  padding: 14px 28px;
  border-radius: 60px;
  text-decoration: none;
  transition: all 0.2s ease;
  font-size: 1rem;
  border: none;
  cursor: pointer;
}
.btn-primary {
  background: #2563eb;
  color: white;
  box-shadow: 0 8px 20px rgba(37,99,235,0.3);
}
.btn-primary:hover {
  background: #1d4ed8;
  transform: translateY(-2px);
}
.btn-outline {
  border: 1.5px solid #60a5fa;
  background: transparent;
  color: #e0e7ff;
}
.btn-outline:hover {
  background: rgba(96,165,250,0.1);
}
.whatsapp-link {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: #86efac;
  text-decoration: none;
  font-weight: 500;
  margin-top: 24px;
  padding: 8px 16px;
  border-radius: 40px;
  background: rgba(34,197,94,0.1);
  transition: all 0.2s ease;
}
.whatsapp-link i {
  font-size: 1.2rem;
  color: #25D366;
}
.whatsapp-link:hover {
  background: rgba(34,197,94,0.2);
}
.loader {
  display: inline-block;
  width: 30px;
  height: 30px;
  border: 3px solid #2563eb;
  border-radius: 50%;
  border-top-color: transparent;
  animation: spin 0.8s linear infinite;
  margin: 20px auto;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.error {
  color: #f87171;
  background: rgba(239,68,68,0.1);
  padding: 12px;
  border-radius: 16px;
  margin: 20px 0;
}
.footer {
  margin-top: 24px;
  font-size: 0.75rem;
  color: #4b5563;
  text-align: center;
}
</style>
</head>
<body>
<div class="container">
  <div class="success-card" id="successCard">
    <div class="icon-circle">
      <i class="fas fa-check-circle"></i>
    </div>
    <h1>Order Confirmed! 🎉</h1>
    <p id="statusMessage">Processing your order details...</p>
    <div id="orderDetails" class="confirmation-details" style="display: none;"></div>
    <div id="errorMessage" class="error" style="display: none;"></div>
    <div id="loaderDiv" class="loader"></div>
    <div id="actionButtons" style="display: none;">
      <a href="/" class="btn btn-primary"><i class="fas fa-home"></i> Return to Home</a>
      <a id="whatsappLink" href="#" target="_blank" class="whatsapp-link" style="display: inline-flex; margin-left: 12px;">
        <i class="fab fa-whatsapp"></i> Need help? Chat with us
      </a>
    </div>
  </div>
  <div class="footer">
    <p>© 2026 Skymaster | Secure checkout powered by Stripe</p>
  </div>
</div>

<script>
// ========== SUPABASE CONFIGURATION ==========
// REPLACE WITH YOUR ACTUAL VALUES
const SUPABASE_URL = 'https://your-project.supabase.co';
const SUPABASE_ANON_KEY = 'your-anon-key';

// ========== OBFUSCATED WHATSAPP NUMBER ==========
(function() {
  const encoded = "37697620871"; // reverse of "17802679673"
  const phoneNumber = encoded.split('').reverse().join('');
  const waLink = document.getElementById('whatsappLink');
  if (waLink) {
    waLink.href = `https://wa.me/${phoneNumber}?text=Hello%2C%20I%20just%20placed%20an%20order%20and%20have%20a%20quick%20question.`;
  }
})();

// ========== GET SESSION ID FROM URL ==========
const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get('session_id');

if (!sessionId) {
  // No session ID – fallback to safe message
  document.getElementById('loaderDiv').style.display = 'none';
  document.getElementById('statusMessage').innerHTML = 'No order session found. Please contact support if you completed a purchase.';
  document.getElementById('errorMessage').style.display = 'block';
  document.getElementById('errorMessage').innerHTML = 'Missing session ID. Your order may still be processing.';
  document.getElementById('actionButtons').style.display = 'block';
} else {
  // Initialize Supabase
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function fetchOrder() {
    try {
      // Query the orders table by stripe_session_id
      const { data, error } = await supabase
        .from('orders')
        .select('*')
        .eq('stripe_session_id', sessionId)
        .single();

      if (error) {
        throw new Error('Order not found. It may take a few moments to process.');
      }

      // Display order details
      const detailsDiv = document.getElementById('orderDetails');
      const amount = (data.amount_total / 100).toFixed(2);
      detailsDiv.innerHTML = `
        <div class="detail-row"><span class="detail-label">Order ID:</span><span class="detail-value">${data.stripe_session_id.slice(-8)}</span></div>
        <div class="detail-row"><span class="detail-label">Customer:</span><span class="detail-value">${escapeHtml(data.customer_name || 'N/A')}</span></div>
        <div class="detail-row"><span class="detail-label">Email:</span><span class="detail-value">${escapeHtml(data.customer_email || 'N/A')}</span></div>
        <div class="detail-row"><span class="detail-label">Shipping address:</span><span class="detail-value">${escapeHtml(data.customer_address || 'No address provided')}</span></div>
        <div class="detail-row"><span class="detail-label">Amount paid:</span><span class="detail-value">$${amount} USD</span></div>
      `;
      const shippingNote = document.createElement('div');
      shippingNote.className = 'shipping-note';
      shippingNote.innerHTML = '📦 You will receive a shipping confirmation email within 1-2 business days.';
      detailsDiv.appendChild(shippingNote);
      detailsDiv.style.display = 'block';

      document.getElementById('statusMessage').innerHTML = 'Thank you for your purchase! Your order details are below.';
      document.getElementById('loaderDiv').style.display = 'none';
      document.getElementById('actionButtons').style.display = 'block';
    } catch (err) {
      console.error(err);
      document.getElementById('loaderDiv').style.display = 'none';
      document.getElementById('statusMessage').innerHTML = 'We received your order, but details are still loading.';
      document.getElementById('errorMessage').style.display = 'block';
      document.getElementById('errorMessage').innerHTML = err.message || 'Unable to fetch order details. Please contact support.';
      document.getElementById('actionButtons').style.display = 'block';
    }
  }

  fetchOrder();
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}
</script>
</body>
</html>
